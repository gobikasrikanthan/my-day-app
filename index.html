<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Day</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1f2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Day">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f7f4;--surface:#ffffff;--surface2:#f1f0ec;--border:#e5e3db;--text:#1a1a16;--soft:#8a8880;--accent:#2c5f4a;--accent-l:#e6f0ec;--warn:#c84b1f;--warn-l:#fdf0eb;--gold:#b08a3e;--gold-l:#faf4e6;--blue:#2a4a7f;--blue-l:#eaeff8;--r:14px;--nav-h:56px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}

/* TOP BAR */
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px 10px;flex-shrink:0;padding-top:max(14px,env(safe-area-inset-top));}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.app-name{font-family:'Instrument Serif',serif;font-size:1.5rem;letter-spacing:-.01em;}
.top-date{font-size:.75rem;color:var(--soft);font-weight:500;}
.day-bar-wrap{display:flex;align-items:center;gap:10px;}
.bar-bg{flex:1;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.bar-txt{font-size:.72rem;color:var(--soft);font-weight:600;white-space:nowrap;}

/* NAV */
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);height:var(--nav-h);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--soft);font-size:.6rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;transition:color .2s;padding:6px 0;}
.nav-btn .ni{font-size:1.1rem;transition:transform .2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn.active .ni{transform:scale(1.15);}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:16px 16px 90px;display:none;-webkit-overflow-scrolling:touch;}
.page.active{display:block;}

/* SECTIONS */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px;cursor:pointer;user-select:none;}
.sec-left{display:flex;align-items:center;gap:8px;}
.sec-title{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);}
.badge{background:var(--surface2);color:var(--soft);border-radius:99px;padding:1px 8px;font-size:.68rem;font-weight:700;}
.badge.lit{background:var(--accent-l);color:var(--accent);}
.caret{font-size:.6rem;color:var(--soft);transition:transform .2s;}
.collapsed>.sec-body{display:none;}
.collapsed .caret{transform:rotate(-90deg);}

/* TASK CARDS */
.card-list{display:flex;flex-direction:column;gap:2px;}
.task-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;padding:12px 13px;transition:background .15s;}
.task-card:hover{background:#fafaf8;}
.task-card.dim{opacity:.5;}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;background:var(--surface);}
.chk:hover{border-color:var(--accent);}
.chk.on{background:var(--accent);border-color:var(--accent);}
.chk.on::after{content:'✓';color:#fff;font-size:.65rem;font-weight:700;}
.t-body{flex:1;min-width:0;}
.t-name{font-size:.88rem;line-height:1.35;color:var(--text);}
.t-name.done{text-decoration:line-through;color:var(--soft);}
.t-notes{font-size:.75rem;color:var(--soft);margin-top:3px;line-height:1.4;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.chip{font-size:.63rem;font-weight:600;padding:2px 7px;border-radius:99px;letter-spacing:.02em;}
.c-area{background:var(--accent-l);color:var(--accent);}
.c-cat{background:var(--surface2);color:var(--soft);}
.c-hi{background:var(--warn-l);color:var(--warn);}
.c-med{background:var(--gold-l);color:var(--gold);}
.c-lo{background:var(--accent-l);color:var(--accent);}
.c-dl{background:#f3eeff;color:#6b3fa0;}
.c-rem{background:#e8f4f8;color:#1a6a8a;}
.t-actions{display:flex;flex-direction:column;gap:2px;align-items:flex-end;flex-shrink:0;}
.ib{background:none;border:none;cursor:pointer;color:#ccc;font-size:.85rem;padding:3px 4px;transition:color .2s;line-height:1;}
.ib:hover{color:var(--soft);}
.ib.danger:hover{color:var(--warn);}

/* AREAS */
.area-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.area-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:14px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;}
.area-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac,var(--accent));}
.area-emoji{font-size:1.4rem;margin-bottom:5px;}
.area-name{font-size:.85rem;font-weight:600;margin-bottom:3px;}
.area-stats{font-size:.7rem;color:var(--soft);}
.area-bar-bg{height:3px;background:var(--surface2);border-radius:99px;margin-top:8px;overflow:hidden;}
.area-bar-fill{height:100%;border-radius:99px;background:var(--ac,var(--accent));transition:width .4s;}
.add-area-card{background:none;border:2px dashed var(--border);border-radius:var(--r);padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:.82rem;color:var(--soft);font-family:'DM Sans',sans-serif;font-weight:500;width:100%;transition:all .2s;grid-column:span 2;}
.add-area-card:hover{border-color:var(--soft);}

/* PROJECTS */
.proj-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:10px;}
.proj-hdr{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.proj-title{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.proj-meta{font-size:.72rem;color:var(--soft);}
.proj-prog{padding:0 16px 12px;}
.proj-bar-bg{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:5px;}
.proj-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}
.proj-prog-txt{font-size:.68rem;color:var(--soft);font-weight:600;}
.st-list{border-top:1px solid var(--border);}
.st-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background .15s;}
.st-row:last-child{border-bottom:none;}
.st-row:hover{background:var(--bg);}
.sq{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:var(--surface);}
.sq:hover{border-color:var(--accent);}
.sq.on{background:var(--accent);border-color:var(--accent);}
.sq.on::after{content:'✓';color:#fff;font-size:.55rem;font-weight:700;}
.st-name{flex:1;font-size:.83rem;}
.st-name.done{text-decoration:line-through;color:var(--soft);}
.st-add{display:flex;gap:8px;padding:10px 16px;background:var(--bg);}
.st-inp{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.82rem;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);outline:none;}
.st-inp:focus{border-color:var(--accent);}
.st-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--soft);}
.empty-ico{font-size:2rem;margin-bottom:10px;}
.empty p{font-size:.85rem;line-height:1.6;}

/* FAB */
.fab-wrap{position:fixed;bottom:calc(var(--nav-h) + 14px + env(safe-area-inset-bottom));right:18px;display:flex;flex-direction:column;align-items:flex-end;gap:10px;z-index:200;}
.fab{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.25rem;box-shadow:0 4px 18px rgba(0,0,0,.14);transition:transform .2s;}
.fab:hover{transform:scale(1.08);}
.fab-main{background:var(--accent);color:#fff;}
.fab-voice{background:#fff;color:var(--accent);border:2px solid var(--accent);}
.fab-voice.rec{background:#e74c3c;border-color:#e74c3c;color:#fff;animation:rp 1s infinite;}
@keyframes rp{0%,100%{box-shadow:0 4px 18px rgba(231,76,60,.3)}50%{box-shadow:0 4px 28px rgba(231,76,60,.65)}}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:22px 22px 0 0;padding:22px 20px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:640px;animation:mup .28s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
@keyframes mup{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Instrument Serif',serif;font-size:1.2rem;}
.mx{background:var(--surface2);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:.9rem;color:var(--soft);}
.fg{margin-bottom:14px;}
.fl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--soft);margin-bottom:6px;display:block;}
.fi,.fs{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:.88rem;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;}
.fi:focus,.fs:focus{border-color:var(--accent);}
textarea.fi{resize:vertical;min-height:65px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.prow,.drow{display:flex;gap:7px;}
.pbtn,.dbtn{flex:1;padding:9px 4px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);font-size:.74rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;color:var(--soft);text-align:center;}
.pbtn.sh{background:var(--warn-l);border-color:var(--warn);color:var(--warn);}
.pbtn.sm{background:var(--gold-l);border-color:var(--gold);color:var(--gold);}
.pbtn.sl{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}
.dbtn.sel{background:var(--surface2);border-color:var(--soft);color:var(--text);}
.btn-p{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:.92rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:6px;}

/* VOICE */
.vstatus{display:none;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:12px;align-items:center;gap:10px;font-size:.82rem;color:var(--soft);}
.vstatus.on{display:flex;}
.vdot{width:8px;height:8px;border-radius:50%;background:#e74c3c;animation:vb 1s infinite;flex-shrink:0;}
@keyframes vb{0%,100%{opacity:1}50%{opacity:.2}}
.ai-msg{font-size:.78rem;color:var(--soft);text-align:center;padding:8px;display:none;}
.ai-msg.on{display:block;}

/* FILTER */
.filter-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:14px;}
.filter-row::-webkit-scrollbar{display:none;}
.fchip{white-space:nowrap;padding:5px 13px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-size:.76rem;font-weight:600;color:var(--soft);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.fchip.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* NOTIF BANNER */
.nb{background:var(--blue-l);border:1px solid #c5d5ee;border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--blue);}
.nb button{margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:5px 11px;font-size:.74rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;white-space:nowrap;}

/* EMOJI / COLOR PICKERS */
.epicker{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.ep{font-size:1.25rem;cursor:pointer;padding:5px;border-radius:8px;border:2px solid transparent;transition:all .15s;}
.ep.sel{border-color:var(--accent);background:var(--accent-l);}
.cpicker{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.cp{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;}
.cp.sel{border-color:var(--text);transform:scale(1.15);}

/* SETTINGS */
.srow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.srow:last-child{border-bottom:none;}
.slabel{font-size:.88rem;font-weight:500;}
.ssub{font-size:.74rem;color:var(--soft);margin-top:2px;}
.toggle{width:44px;height:26px;border-radius:99px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(18px);}
</style>
</head>
<body>
<div id="app">

  <div class="top-bar">
    <div class="top-row"><span class="app-name">My Day</span><span class="top-date" id="topDate"></span></div>
    <div class="day-bar-wrap">
      <div class="bar-bg"><div class="bar-fill" id="dayFill"></div></div>
      <span class="bar-txt" id="dayTxt">0 / 0</span>
    </div>
  </div>

  <div class="pages">

    <!-- TODAY -->
    <div class="page active" id="page-today">
      <div class="vstatus" id="vstatus"><div class="vdot"></div><span id="vtxt">Listening…</span></div>
      <div class="ai-msg" id="aiMsg">✨ AI is sorting your task…</div>
      <div id="nBanner"></div>
      <div class="filter-row" id="filterRow"></div>
      <div id="todaySecs"></div>
    </div>

    <!-- AREAS -->
    <div class="page" id="page-areas">
      <div class="area-grid" id="areaGrid"></div>
      <div id="areaDetail" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <button onclick="closeAreaDetail()" style="background:var(--surface2);border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--soft);">← Back</button>
          <span id="aDetailTitle" style="font-family:'Instrument Serif',serif;font-size:1.2rem;"></span>
        </div>
        <div id="aDetailBody"></div>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="page" id="page-projects">
      <div id="projList"></div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div style="font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:18px;">Settings</div>
      <div class="srow">
        <div><div class="slabel">Notifications</div><div class="ssub">Reminders for your tasks</div></div>
        <button class="toggle" id="notifToggle" onclick="toggleNotif()"></button>
      </div>
      <div class="srow">
        <div><div class="slabel">Manage Areas</div><div class="ssub">Edit your areas of life</div></div>
        <button onclick="switchPage('areas')" style="background:var(--surface2);border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--soft);">Go →</button>
      </div>
      <div class="srow">
        <div><div class="slabel">Clear all tasks</div><div class="ssub">Keeps areas and projects</div></div>
        <button onclick="clearTasks()" style="background:var(--warn-l);border:1px solid var(--warn);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--warn);font-weight:600;">Clear</button>
      </div>
      <div style="margin-top:28px;font-size:.74rem;color:var(--soft);text-align:center;line-height:1.7;">My Day · All data saved on this device only</div>
    </div>

  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nb-today"    onclick="switchPage('today')">   <span class="ni">☀️</span>Today</button>
    <button class="nav-btn"        id="nb-areas"    onclick="switchPage('areas')">   <span class="ni">🗂️</span>Areas</button>
    <button class="nav-btn"        id="nb-projects" onclick="switchPage('projects')"><span class="ni">📁</span>Projects</button>
    <button class="nav-btn"        id="nb-settings" onclick="switchPage('settings')"><span class="ni">⚙️</span>Settings</button>
  </nav>
</div>

<div class="fab-wrap" id="fabWrap">
  <button class="fab fab-voice" id="voiceBtn">🎙️</button>
  <button class="fab fab-main"  id="fabMain">＋</button>
</div>

<!-- TASK MODAL -->
<div class="overlay" id="taskModal">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-title" id="tmTitle">Add Task</span><button class="mx" onclick="closeModal('taskModal')">✕</button></div>
    <div class="fg"><label class="fl">Task name</label><input class="fi" id="tName" placeholder="What needs to be done?"></div>
    <div class="fg"><label class="fl">Notes (optional)</label><textarea class="fi" id="tNotes" placeholder="Any extra details…" rows="2"></textarea></div>
    <div class="r2">
      <div class="fg"><label class="fl">Area of life</label><select class="fs" id="tArea"></select></div>
      <div class="fg"><label class="fl">Category</label><select class="fs" id="tCat"></select></div>
    </div>
    <div class="fg"><label class="fl">Duration</label>
      <div class="drow">
        <button class="dbtn" data-d="15"  onclick="selDur('15')">⚡ 15 min</button>
        <button class="dbtn" data-d="30"  onclick="selDur('30')">🕐 30 min</button>
        <button class="dbtn" data-d="60+" onclick="selDur('60+')">🕒 60+ min</button>
      </div>
    </div>
    <div class="fg"><label class="fl">Priority</label>
      <div class="prow">
        <button class="pbtn" data-p="high" onclick="selP('high')">🔴 High</button>
        <button class="pbtn sm" data-p="med" onclick="selP('med')">🟡 Medium</button>
        <button class="pbtn" data-p="low"  onclick="selP('low')">🟢 Low</button>
      </div>
    </div>
    <div class="r2">
      <div class="fg"><label class="fl">Deadline</label><input class="fi" id="tDeadline" type="datetime-local"></div>
      <div class="fg"><label class="fl">Reminder</label><input class="fi" id="tReminder" type="datetime-local"></div>
    </div>
    <input type="hidden" id="tEditId">
    <button class="btn-p" onclick="saveTask()">Save Task</button>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="overlay" id="projModal">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-title">New Project</span><button class="mx" onclick="closeModal('projModal')">✕</button></div>
    <div class="fg"><label class="fl">Project name</label><input class="fi" id="pName" placeholder="e.g. Kitchen renovation"></div>
    <div class="fg"><label class="fl">Area</label><select class="fs" id="pArea"></select></div>
    <div class="fg"><label class="fl">Icon</label><div class="epicker" id="pEmojiPicker"></div></div>
    <div class="fg"><label class="fl">Deadline (optional)</label><input class="fi" id="pDeadline" type="date"></div>
    <button class="btn-p" onclick="saveProject()">Create Project</button>
  </div>
</div>

<!-- AREA MODAL -->
<div class="overlay" id="areaModal">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-title">New Area of Life</span><button class="mx" onclick="closeModal('areaModal')">✕</button></div>
    <div class="fg"><label class="fl">Name</label><input class="fi" id="aName" placeholder="e.g. Side hustle"></div>
    <div class="fg"><label class="fl">Icon</label><div class="epicker" id="aEmojiPicker"></div></div>
    <div class="fg"><label class="fl">Colour</label><div class="cpicker" id="colorPicker"></div></div>
    <button class="btn-p" onclick="saveArea()">Add Area</button>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const DEFAULT_AREAS=[
  {id:'household',name:'Household',     emoji:'🏠',color:'#2c5f4a'},
  {id:'business', name:'Business',      emoji:'💼',color:'#2a4a7f'},
  {id:'health',   name:'Health & Fitness',emoji:'💪',color:'#c84b1f'},
  {id:'personal', name:'Personal Growth',emoji:'🌱',color:'#6b3fa0'},
  {id:'family',   name:'Family',        emoji:'❤️', color:'#b85c8a'},
  {id:'finance',  name:'Finance',       emoji:'💰',color:'#b08a3e'},
];
const CATS=['General','Admin','Errand','Cleaning','Cooking','Exercise','Meeting','Planning','Shopping','Other'];
const EMOJIS=['📁','🏠','💼','🎯','🌱','✈️','🎨','🛒','💪','📚','🔧','🌟','🎉','🚀','❤️','🏋️','🍳','🧹','🧺','📦','💰','🎓','🌍','🤝'];
const COLORS=['#2c5f4a','#2a4a7f','#c84b1f','#6b3fa0','#b85c8a','#b08a3e','#1a7a6e','#c0392b','#2980b9','#8e44ad'];

// ── STATE ────────────────────────────────────────────────────────────────────
let areas    = JSON.parse(localStorage.getItem('md3_areas') || 'null') || DEFAULT_AREAS;
let tasks    = JSON.parse(localStorage.getItem('md3_tasks') || '[]');
let projects = JSON.parse(localStorage.getItem('md3_projects') || '[]');
let notifOn  = localStorage.getItem('md3_notif') === 'true';

let selPri='med', selDuration='30', selEmoji='📁', selColor=COLORS[0], aSelEmoji='🏷️';
let activeFilter='all', isRecording=false, recognition=null, currentPage='today', editId=null;

// ── PERSIST ──────────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem('md3_areas',    JSON.stringify(areas));
  localStorage.setItem('md3_tasks',    JSON.stringify(tasks));
  localStorage.setItem('md3_projects', JSON.stringify(projects));
  localStorage.setItem('md3_notif',    notifOn);
}

// ── UTILS ────────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const areaById=id=>areas.find(a=>a.id===id)||{name:'Other',emoji:'📌',color:'#888'};
function todayStr(){return new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});}
function fmtDL(dt){
  if(!dt)return '';
  const d=new Date(dt),now=new Date(),diff=d-now;
  if(diff<0)return '⚠️ Overdue';
  if(diff<3600000)return `⏰ ${Math.round(diff/60000)}m`;
  if(diff<86400000)return `⏰ ${Math.round(diff/3600000)}h`;
  return `📅 ${d.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`;
}

// ── PAGE SWITCH ───────────────────────────────────────────────────────────────
function switchPage(p){
  currentPage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nb-'+p)?.classList.add('active');
  const showFab=p==='today'||p==='projects';
  document.getElementById('fabWrap').style.display=showFab?'flex':'none';
  if(p==='projects'){document.getElementById('fabMain').textContent='📁';document.getElementById('voiceBtn').style.display='none';}
  else{document.getElementById('fabMain').textContent='＋';document.getElementById('voiceBtn').style.display='flex';}
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('topDate').textContent=todayStr();
  renderDayBar(); renderFilters(); renderToday(); renderAreas(); renderProjects();
  renderNotifBanner(); document.getElementById('notifToggle').classList.toggle('on',notifOn||Notification.permission==='granted');
}

function renderDayBar(){
  const tot=tasks.length,done=tasks.filter(t=>t.done).length,pct=tot?Math.round(done/tot*100):0;
  document.getElementById('dayFill').style.width=pct+'%';
  document.getElementById('dayTxt').textContent=`${done} / ${tot} done`;
}

function renderFilters(){
  const ids=['all',...new Set(tasks.map(t=>t.areaId))];
  document.getElementById('filterRow').innerHTML=ids.map(id=>{
    if(id==='all')return`<button class="fchip ${activeFilter==='all'?'on':''}" onclick="setFilter('all')">✦ All</button>`;
    const a=areaById(id);
    return`<button class="fchip ${activeFilter===id?'on':''}" onclick="setFilter('${id}')">${a.emoji} ${a.name}</button>`;
  }).join('');
}

function renderToday(){
  const cont=document.getElementById('todaySecs');
  let list=activeFilter==='all'?[...tasks]:tasks.filter(t=>t.areaId===activeFilter);
  if(!list.length){cont.innerHTML=`<div class="empty"><div class="empty-ico">☀️</div><p>No tasks yet.<br>Tap ＋ or 🎙️ to add one.</p></div>`;return;}

  const pOrd={high:0,med:1,low:2};
  list.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    if(a.deadline&&b.deadline)return new Date(a.deadline)-new Date(b.deadline);
    if(a.deadline)return -1; if(b.deadline)return 1;
    return pOrd[a.priority]-pOrd[b.priority];
  });

  const buckets={'⚡ Quick — 15 min':[],'🕐 Short — 30 min':[],'🕒 Longer tasks':[]};
  list.forEach(t=>{
    if(t.duration==='15')buckets['⚡ Quick — 15 min'].push(t);
    else if(t.duration==='30')buckets['🕐 Short — 30 min'].push(t);
    else buckets['🕒 Longer tasks'].push(t);
  });

  cont.innerHTML=Object.entries(buckets).filter(([,ts])=>ts.length).map(([label,ts])=>{
    const done=ts.filter(t=>t.done).length;
    return`<div class="sec-wrap">
      <div class="sec-hdr" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="sec-left"><span class="sec-title">${label}</span><span class="badge ${done>0?'lit':''}">${done}/${ts.length}</span></div>
        <span class="caret">▾</span>
      </div>
      <div class="sec-body card-list" style="margin-bottom:18px;">${ts.map(tRow).join('')}</div>
    </div>`;
  }).join('');
}

function tRow(t){
  const a=areaById(t.areaId);
  const pc={high:'c-hi',med:'c-med',low:'c-lo'}[t.priority]||'c-lo';
  const dl=fmtDL(t.deadline);
  const rem=t.reminder?`<span class="chip c-rem">🔔 ${new Date(t.reminder).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}</span>`:'';
  return`<div class="task-card ${t.done?'dim':''}">
    <div class="chk ${t.done?'on':''}" onclick="toggleTask('${t.id}')"></div>
    <div class="t-body">
      <div class="t-name ${t.done?'done':''}">${t.name}</div>
      ${t.notes?`<div class="t-notes">${t.notes}</div>`:''}
      <div class="chips">
        <span class="chip c-area" style="background:${a.color}18;color:${a.color}">${a.emoji} ${a.name}</span>
        ${t.cat&&t.cat!=='General'?`<span class="chip c-cat">${t.cat}</span>`:''}
        <span class="chip ${pc}">${{high:'🔴 High',med:'🟡 Med',low:'🟢 Low'}[t.priority]}</span>
        ${dl?`<span class="chip c-dl">${dl}</span>`:''}
        ${rem}
      </div>
    </div>
    <div class="t-actions">
      <button class="ib" onclick="editTask('${t.id}')">✏️</button>
      <button class="ib danger" onclick="delTask('${t.id}')">✕</button>
    </div>
  </div>`;
}

// ── AREAS ─────────────────────────────────────────────────────────────────────
function renderAreas(){
  const g=document.getElementById('areaGrid'); if(!g)return;
  g.innerHTML=areas.map(a=>{
    const at=tasks.filter(t=>t.areaId===a.id),done=at.filter(t=>t.done).length,pct=at.length?Math.round(done/at.length*100):0;
    return`<div class="area-card" style="--ac:${a.color}" onclick="openAreaDetail('${a.id}')">
      <div class="area-emoji">${a.emoji}</div>
      <div class="area-name">${a.name}</div>
      <div class="area-stats">${at.length} tasks · ${pct}% done</div>
      <div class="area-bar-bg"><div class="area-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('')+`<button class="add-area-card" onclick="openAreaModal()">＋ Add area of life</button>`;
}

function openAreaDetail(aId){
  document.getElementById('areaGrid').style.display='none';
  document.getElementById('areaDetail').style.display='block';
  const a=areaById(aId);
  document.getElementById('aDetailTitle').textContent=`${a.emoji} ${a.name}`;
  const at=tasks.filter(t=>t.areaId===aId);
  document.getElementById('aDetailBody').innerHTML=at.length
    ?`<div class="card-list">${at.map(tRow).join('')}</div>`
    :`<div class="empty"><div class="empty-ico">${a.emoji}</div><p>No tasks in this area yet.</p></div>`;
}
function closeAreaDetail(){
  document.getElementById('areaGrid').style.display='';
  document.getElementById('areaDetail').style.display='none';
}

// ── PROJECTS ──────────────────────────────────────────────────────────────────
function renderProjects(){
  const cont=document.getElementById('projList'); if(!cont)return;
  if(!projects.length){cont.innerHTML=`<div class="empty"><div class="empty-ico">📁</div><p>No projects yet.<br>Tap 📁 to create one.</p></div>`;return;}
  cont.innerHTML=projects.map(p=>{
    const subs=p.subtasks||[],done=subs.filter(s=>s.done).length,pct=subs.length?Math.round(done/subs.length*100):0;
    const a=areaById(p.areaId);
    const dl=p.deadline?` · 📅 ${new Date(p.deadline).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`:'';
    return`<div class="proj-card">
      <div class="proj-hdr">
        <div><div class="proj-title">${p.emoji||'📁'} ${p.name}</div><div class="proj-meta">${a.emoji} ${a.name}${dl}</div></div>
        <button class="ib danger" onclick="delProject('${p.id}')">✕</button>
      </div>
      <div class="proj-prog">
        <div class="proj-bar-bg"><div class="proj-bar-fill" style="width:${pct}%"></div></div>
        <div class="proj-prog-txt">${done} / ${subs.length} subtasks · ${pct}% complete</div>
      </div>
      <div class="st-list">${subs.map(s=>`
        <div class="st-row">
          <div class="sq ${s.done?'on':''}" onclick="toggleSub('${p.id}','${s.id}')"></div>
          <div class="st-name ${s.done?'done':''}">${s.name}</div>
          <button class="ib danger" onclick="delSub('${p.id}','${s.id}')">✕</button>
        </div>`).join('')}</div>
      <div class="st-add">
        <input class="st-inp" id="st-${p.id}" placeholder="Add subtask…" onkeydown="if(event.key==='Enter')addSub('${p.id}')">
        <button class="st-btn" onclick="addSub('${p.id}')">Add</button>
      </div>
    </div>`;
  }).join('');
}

// ── TASK ACTIONS ──────────────────────────────────────────────────────────────
function setFilter(id){activeFilter=id;render();}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();render();}}
function delTask(id){if(!confirm('Delete this task?'))return;tasks=tasks.filter(t=>t.id!==id);save();render();}
function clearTasks(){if(!confirm('Delete ALL tasks?'))return;tasks=[];save();render();}

function editTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  editId=id;
  buildAreaSel(t.areaId); buildCatSel(t.cat);
  selP(t.priority||'med'); selDur(t.duration||'30');
  document.getElementById('tName').value=t.name;
  document.getElementById('tNotes').value=t.notes||'';
  document.getElementById('tDeadline').value=t.deadline?t.deadline.slice(0,16):'';
  document.getElementById('tReminder').value=t.reminder?t.reminder.slice(0,16):'';
  document.getElementById('tmTitle').textContent='Edit Task';
  openModal('taskModal');
}

// ── PROJECT ACTIONS ───────────────────────────────────────────────────────────
function toggleSub(pid,sid){const p=projects.find(p=>p.id===pid);if(!p)return;const s=p.subtasks.find(s=>s.id===sid);if(s){s.done=!s.done;save();render();}}
function delSub(pid,sid){const p=projects.find(p=>p.id===pid);if(p){p.subtasks=p.subtasks.filter(s=>s.id!==sid);save();render();}}
function addSub(pid){const inp=document.getElementById('st-'+pid);const n=inp?.value.trim();if(!n)return;const p=projects.find(p=>p.id===pid);if(p){p.subtasks.push({id:uid(),name:n,done:false});save();render();}}
function delProject(pid){if(!confirm('Delete this project?'))return;projects=projects.filter(p=>p.id!==pid);save();render();}

// ── PRIORITY / DURATION ───────────────────────────────────────────────────────
function selP(p){selPri=p;document.querySelectorAll('.pbtn').forEach(b=>{b.className='pbtn';if(b.dataset.p===p)b.classList.add({high:'sh',med:'sm',low:'sl'}[p]);});}
function selDur(d){selDuration=d;document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('sel',b.dataset.d===d));}

// ── TASK MODAL ────────────────────────────────────────────────────────────────
function openTaskModal(name='',aId='',cat='',pri='med',dur='30',notes=''){
  editId=null;
  document.getElementById('tmTitle').textContent='Add Task';
  document.getElementById('tName').value=name;
  document.getElementById('tNotes').value=notes;
  document.getElementById('tDeadline').value='';
  document.getElementById('tReminder').value='';
  buildAreaSel(aId); buildCatSel(cat); selP(pri); selDur(dur);
  openModal('taskModal');
  setTimeout(()=>document.getElementById('tName').focus(),300);
}
function buildAreaSel(sel=''){document.getElementById('tArea').innerHTML=areas.map(a=>`<option value="${a.id}" ${a.id===sel?'selected':''}>${a.emoji} ${a.name}</option>`).join('');}
function buildCatSel(sel=''){document.getElementById('tCat').innerHTML=CATS.map(c=>`<option value="${c}" ${c===sel?'selected':''}>${c}</option>`).join('');}
function saveTask(){
  const name=document.getElementById('tName').value.trim();if(!name){document.getElementById('tName').focus();return;}
  const t={
    id:editId||uid(),name,
    notes:document.getElementById('tNotes').value.trim(),
    areaId:document.getElementById('tArea').value,
    cat:document.getElementById('tCat').value,
    priority:selPri, duration:selDuration,
    deadline:document.getElementById('tDeadline').value||'',
    reminder:document.getElementById('tReminder').value||'',
    done:false,
  };
  if(editId){const i=tasks.findIndex(x=>x.id===editId);if(i>-1){t.done=tasks[i].done;tasks[i]=t;}}
  else tasks.push(t);
  if(t.reminder)scheduleReminder(t);
  editId=null; save(); render(); closeModal('taskModal');
}

// ── PROJECT MODAL ─────────────────────────────────────────────────────────────
function openProjModal(){
  document.getElementById('pName').value='';document.getElementById('pDeadline').value='';
  document.getElementById('pArea').innerHTML=areas.map(a=>`<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('');
  selEmoji='📁';
  document.getElementById('pEmojiPicker').innerHTML=EMOJIS.map(e=>`<span class="ep ${e===selEmoji?'sel':''}" onclick="pickPEmoji('${e}')">${e}</span>`).join('');
  openModal('projModal');setTimeout(()=>document.getElementById('pName').focus(),300);
}
function pickPEmoji(e){selEmoji=e;document.querySelectorAll('#pEmojiPicker .ep').forEach(el=>el.classList.toggle('sel',el.textContent===e));}
function saveProject(){
  const name=document.getElementById('pName').value.trim();if(!name){document.getElementById('pName').focus();return;}
  projects.push({id:uid(),name,emoji:selEmoji,areaId:document.getElementById('pArea').value,deadline:document.getElementById('pDeadline').value||'',subtasks:[]});
  save();render();closeModal('projModal');
}

// ── AREA MODAL ────────────────────────────────────────────────────────────────
function openAreaModal(){
  document.getElementById('aName').value='';aSelEmoji='🏷️';selColor=COLORS[0];
  document.getElementById('aEmojiPicker').innerHTML=EMOJIS.map(e=>`<span class="ep ${e===aSelEmoji?'sel':''}" onclick="pickAEmoji('${e}')">${e}</span>`).join('');
  document.getElementById('colorPicker').innerHTML=COLORS.map(c=>`<div class="cp ${c===selColor?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
  openModal('areaModal');
}
function pickAEmoji(e){aSelEmoji=e;document.querySelectorAll('#aEmojiPicker .ep').forEach(el=>el.classList.toggle('sel',el.textContent===e));}
function pickColor(c){selColor=c;document.querySelectorAll('.cp').forEach(el=>el.classList.toggle('sel',el.style.background===c||el.style.backgroundColor===c));}
function saveArea(){
  const name=document.getElementById('aName').value.trim();if(!name){document.getElementById('aName').focus();return;}
  areas.push({id:'a_'+uid(),name,emoji:aSelEmoji,color:selColor});
  save();render();closeModal('areaModal');
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');editId=null;}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o){o.classList.remove('open');editId=null;}}));
document.getElementById('fabMain').addEventListener('click',()=>{if(currentPage==='projects')openProjModal();else{editId=null;openTaskModal();}});

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function renderNotifBanner(){
  const b=document.getElementById('nBanner');if(!b)return;
  if(notifOn||Notification.permission==='granted'||Notification.permission==='denied'){b.innerHTML='';return;}
  b.innerHTML=`<div class="nb">🔔 Enable notifications to get reminders<button onclick="requestNotif()">Enable</button></div>`;
}
async function toggleNotif(){
  if(notifOn){notifOn=false;save();render();return;}
  await requestNotif();
}
async function requestNotif(){
  if(!('Notification' in window)){alert('Notifications not supported here.');return;}
  const p=await Notification.requestPermission();
  notifOn=p==='granted';save();render();
}
function scheduleReminder(task){
  if(Notification.permission!=='granted'||!task.reminder)return;
  const ms=new Date(task.reminder)-Date.now();
  if(ms<=0)return;
  setTimeout(()=>new Notification('My Day 🔔',{body:task.name,icon:'icon-192.png'}),ms);
}
function restoreReminders(){tasks.forEach(t=>{if(t.reminder&&!t.done)scheduleReminder(t);});}

// ── VOICE ─────────────────────────────────────────────────────────────────────
document.getElementById('voiceBtn').addEventListener('click',toggleVoice);
function toggleVoice(){
  if(isRecording){stopRec();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice needs Chrome or Safari.');return;}
  recognition=new SR();recognition.lang='en-AU';recognition.interimResults=false;recognition.maxAlternatives=1;
  recognition.onstart=()=>{isRecording=true;document.getElementById('voiceBtn').classList.add('rec');document.getElementById('voiceBtn').textContent='⏹';showV('Listening… speak your task and any details');};
  recognition.onresult=async(e)=>{const t=e.results[0][0].transcript;showV(`"${t}"`);stopRec();await aiProcess(t);};
  recognition.onerror=()=>{stopRec();hideV();};
  recognition.onend=()=>{if(isRecording)stopRec();};
  recognition.start();
}
function stopRec(){isRecording=false;const vb=document.getElementById('voiceBtn');vb.classList.remove('rec');vb.textContent='🎙️';recognition?.stop();}
function showV(t){document.getElementById('vstatus').classList.add('on');document.getElementById('vtxt').textContent=t;}
function hideV(){document.getElementById('vstatus').classList.remove('on');}

async function aiProcess(transcript){
  document.getElementById('aiMsg').classList.add('on');
  const aList=areas.map(a=>`${a.id}: ${a.name}`).join(', ');
  const prompt=`You are a smart task assistant. Extract all details from this voice note and return ONLY valid JSON (no markdown):
{"name":"concise task name","notes":"extra context if any, else empty","areaId":"best area id from list","cat":"one of: ${CATS.join(',')}","priority":"high|med|low","duration":"15|30|60+","deadline":"ISO datetime if mentioned else empty","reminder":"ISO datetime if they said remind me else empty"}

Areas: ${aList}
Now: ${new Date().toISOString()}
Voice: "${transcript}"`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const p=JSON.parse(raw);
    document.getElementById('aiMsg').classList.remove('on');hideV();editId=null;
    openTaskModal(p.name||transcript,p.areaId||areas[0]?.id,p.cat||'General',p.priority||'med',p.duration||'30',p.notes||'');
    if(p.deadline)document.getElementById('tDeadline').value=p.deadline.slice(0,16);
    if(p.reminder)document.getElementById('tReminder').value=p.reminder.slice(0,16);
  }catch(err){
    document.getElementById('aiMsg').classList.remove('on');hideV();editId=null;openTaskModal(transcript);
  }
}

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

// ── INIT ──────────────────────────────────────────────────────────────────────
restoreReminders();
render();
</script>
